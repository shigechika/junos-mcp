name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12", "3.13", "3.14"]
        include:
          # Smoke-test on Windows to guard against stdio newline regressions
          # (cf. modelcontextprotocol/python-sdk#2433). One Python version is
          # sufficient since the bug is platform-level, not version-specific.
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - run: pip install -e ".[test]"
      - run: pytest tests/ -v
